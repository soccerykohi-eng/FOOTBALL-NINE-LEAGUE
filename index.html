<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FOOTBALL NINE LEAGUE Mobile Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #08090c;
            --bg-card: #12151d;
            --bg-elevated: #1a1e2a;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f2f0e8;
            --text-muted: #8a919e;
            --accent-gold: #c6a664;
            --accent-gold-light: #e5cb91;
            --accent-cyan: #38bdf8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --nav-height: 60px;
            --header-height: 56px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Noto Sans JP', sans-serif;
            line-height: 1.4;
            padding-top: var(--header-height);
            padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px) + 1.2rem);
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }

        /* ヘッダー */
        header {
            background: #12151d;
            border-bottom: 1px solid var(--border-color);
            padding: 0 0.8rem;
            padding-top: env(safe-area-inset-top, 0px);
            height: calc(var(--header-height) + env(safe-area-inset-top, 0px));
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .fnl-brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .fnl-brand-title {
            font-family: 'Teko', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .fnl-brand-sub {
            font-size: 0.55rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        .header-right-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sync-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.65rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 3px 8px;
            border-radius: 20px;
            color: var(--text-muted);
        }

        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #f59e0b;
        }

        .sync-dot.online {
            background: var(--accent-green);
            box-shadow: 0 0 6px var(--accent-green);
        }

        .current-page-title {
            font-size: 0.72rem;
            color: var(--accent-gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(198, 166, 100, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(198, 166, 100, 0.2);
        }

        /* コンテナ */
        .container {
            padding: 0.8rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* セクション */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .section-title {
            font-family: 'Teko', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--accent-gold);
            border-radius: 2px;
        }

        /* フィルターチップ */
        .filter-scroll {
            display: flex;
            gap: 0.4rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            margin-bottom: 0.8rem;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .filter-scroll::-webkit-scrollbar { display: none; }

        .chip {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.35rem 0.8rem;
            font-size: 0.78rem;
            font-weight: 700;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
        }

        .chip.active {
            background: var(--accent-gold);
            color: #000;
            border-color: var(--accent-gold);
        }

        /* カード */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.9rem;
            margin-bottom: 0.8rem;
        }

        /* ヒーローバナー */
        .hero-banner {
            background: linear-gradient(135deg, #181d28 0%, #0a0d14 100%);
            border: 1px solid rgba(198, 166, 100, 0.25);
            border-radius: 14px;
            padding: 1.2rem 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .hero-logo-large {
            width: 60px; height: 60px; margin: 0 auto 0.6rem; display: block;
        }

        .hero-subtitle {
            color: var(--accent-gold); font-size: 0.7rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 0.2rem;
        }

        .hero-title {
            font-family: 'Teko', sans-serif; font-size: 2.2rem; line-height: 0.95; margin-bottom: 0.4rem; color: #fff;
        }

        /* マッチカード */
        .match-card-mobile {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.8rem;
            margin-bottom: 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .match-main-row { display: flex; align-items: center; justify-content: space-between; }
        .match-info-side { display: flex; flex-direction: column; gap: 2px; width: 50px; flex-shrink: 0; }
        .match-sec-badge { font-size: 0.65rem; color: var(--accent-gold); font-weight: bold; }

        .match-teams-center {
            flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 0 0.2rem;
        }

        .match-team-box { display: flex; align-items: center; gap: 6px; flex: 1; overflow: hidden; }
        .match-team-box.home { justify-content: flex-end; text-align: right; }
        .match-team-box.away { justify-content: flex-start; text-align: left; }
        .match-team-name { font-size: 0.8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .match-score-pill {
            background: var(--bg-body); border: 1px solid var(--border-color); padding: 0.2rem 0.5rem;
            border-radius: 6px; font-family: 'Teko', sans-serif; font-size: 1.2rem; font-weight: bold;
            color: var(--text-main); min-width: 46px; text-align: center; flex-shrink: 0;
        }

        .match-score-pill.played { color: var(--accent-gold); border-color: var(--accent-gold); }

        .edit-score-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); color: var(--text-muted);
            font-size: 0.72rem; padding: 6px 10px; border-radius: 6px; width: 100%; text-align: center;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        .line-share-btn {
            background: #06c755; color: #fff; border: none; font-size: 0.75rem; font-weight: bold;
            padding: 6px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px;
        }

        .team-logo-img { width: 24px; height: 24px; border-radius: 50%; object-fit: contain; flex-shrink: 0; }
        .team-logo-lg { width: 56px; height: 56px; border-radius: 50%; object-fit: contain; margin: 0 auto 0.4rem; display: block; }

        /* 順位表テーブル */
        table.mobile-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        table.mobile-table th { color: var(--text-muted); font-size: 0.68rem; padding: 0.4rem 0.2rem; border-bottom: 1px solid var(--border-color); text-align: center; }
        table.mobile-table td { padding: 0.55rem 0.2rem; border-bottom: 1px solid rgba(255,255,255,0.03); text-align: center; }

        .team-col { text-align: left !important; font-weight: 700; display: flex; align-items: center; gap: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rank-num { font-family: 'Teko', sans-serif; font-size: 1.1rem; font-weight: bold; width: 18px; color: var(--text-muted); }
        .pts-badge { font-family: 'Teko', sans-serif; font-size: 1.1rem; font-weight: bold; color: var(--accent-gold); }

        /* ニュース */
        .news-item { padding: 0.8rem 0; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 3px; cursor: pointer; }
        .news-meta { display: flex; align-items: center; gap: 6px; }
        .news-date { font-size: 0.68rem; color: var(--text-muted); }
        .news-category { font-size: 0.62rem; background: rgba(198, 166, 100, 0.15); color: var(--accent-gold-light); padding: 1px 5px; border-radius: 4px; font-weight: bold; }
        .news-title { font-size: 0.88rem; font-weight: 700; line-height: 1.3; }

        /* 規約 */
        .rule-chapter { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 0.6rem; overflow: hidden; }
        .rule-chapter-header { padding: 0.8rem; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: var(--bg-elevated); font-weight: 700; font-size: 0.85rem; }
        .rule-chapter-content { padding: 0.8rem; display: none; font-size: 0.8rem; line-height: 1.5; color: #d1d5db; }
        .rule-chapter-content.active { display: block; }
        .rule-article-title { font-weight: 700; color: var(--accent-gold-light); margin-top: 0.6rem; margin-bottom: 0.2rem; font-size: 0.82rem; }
        .rule-article-title:first-child { margin-top: 0; }

        /* ナビゲーションバー (6メニュー) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px));
            padding-bottom: env(safe-area-inset-bottom, 0px);
            background: #12151d; border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 700;
            width: 16.6%; height: 100%; gap: 2px; cursor: pointer; position: relative;
        }

        .nav-item.active { color: var(--accent-gold); }
        .nav-item.active::before {
            content: ''; position: absolute; top: 0; width: 18px; height: 2px; background: var(--accent-gold);
        }

        .nav-svg-icon { width: 18px; height: 18px; fill: currentColor; }

        /* モーダルシート */
        .sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
            display: flex; align-items: flex-end;
        }

        .sheet-overlay.active { opacity: 1; pointer-events: auto; }
        .sheet-content {
            background: var(--bg-card); width: 100%; border-top-left-radius: 16px; border-top-right-radius: 16px;
            padding: 1.2rem; transform: translateY(100%); transition: transform 0.2s ease-out;
            border-top: 1px solid var(--border-color); max-height: 85vh; overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .sheet-overlay.active .sheet-content { transform: translateY(0); }
        .sheet-bar { width: 32px; height: 4px; background: var(--border-color); border-radius: 2px; margin: 0 auto 0.8rem; }

        .btn-primary { background: var(--accent-gold); color: #000; border: none; width: 100%; padding: 0.75rem; border-radius: 8px; font-weight: 700; font-size: 0.9rem; cursor: pointer; }
        .btn-secondary { background: rgba(198, 166, 100, 0.15); color: var(--accent-gold-light); border: 1px solid rgba(198, 166, 100, 0.3); padding: 0.35rem 0.7rem; border-radius: 6px; font-weight: 700; font-size: 0.75rem; cursor: pointer; }
        .btn-danger { background: transparent; color: var(--accent-red); border: 1px solid rgba(239,68,68,0.3); width: 100%; padding: 0.6rem; border-radius: 8px; font-weight: 700; font-size: 0.8rem; cursor: pointer; margin-top:0.5rem; }

        .form-group { margin-bottom: 0.8rem; }
        .form-label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.3rem; }
        .form-input, .form-select, .form-textarea {
            width: 100%; background: var(--bg-body); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 0.5rem 0.7rem; color: var(--text-main); font-size: 0.82rem; outline: none;
        }

        .copy-textarea {
            width: 100%; height: 120px; background: #000; color: var(--accent-green); border: 1px solid var(--border-color);
            border-radius: 6px; padding: 8px; font-family: monospace; font-size: 0.72rem; margin-bottom: 0.8rem; outline:none;
        }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <header>
        <div class="header-logo-wrap" onclick="navigateTo('home', 'HOME')">
            <svg width="26" height="26" viewBox="0 0 300 300" fill="none">
                <path d="M40 40H260V90H140V130H200L140 190H90V90H40V260H90V210H140L200 260H260V130L260 40Z" fill="#F2F0E8" fill-rule="evenodd"/>
                <path d="M140 90L200 130H140V90Z" fill="#C6A664"/>
            </svg>
            <div class="fnl-brand-text">
                <span class="fnl-brand-title">FNL</span>

            </div>
        </div>

        <div class="header-right-status">
            <div class="sync-badge">
                <span class="sync-dot" id="sync-dot-indicator"></span>
                <span id="sync-text-status">Firebase 接続済み</span>
            </div>
            <div class="current-page-title" id="page-title-display">HOME</div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="container">
        
        <!-- PAGE 1: HOME -->
        <section id="page-home" class="page active">
            <div class="hero-banner">
                <svg class="hero-logo-large" viewBox="0 0 300 300" fill="none">
                    <path d="M40 40H260V90H140V130H200L140 190H90V90H40V260H90V210H140L200 260H260V130L260 40Z" fill="#F2F0E8" fill-rule="evenodd"/>
                    <path d="M140 90L200 130H140V90Z" fill="#C6A664"/>
                </svg>
                <div class="hero-subtitle">SEASON 1 - 2026</div>
                <div class="hero-title">FOOTBALL NINE LEAGUE</div>
                <p style="font-size: 0.75rem; color: var(--text-muted);">全9チーム公式ポータル</p>
            </div>

            <div class="section-header">
                <div class="section-title">NEXT / LATEST MATCH</div>
            </div>
            <div class="match-card-mobile" style="background: var(--bg-card); border-color: rgba(198, 166, 100, 0.4);" id="home-featured-match"></div>

            <div class="section-header" style="margin-top: 1.2rem;">
                <div class="section-title">TOPICS</div>
                <button class="btn-secondary" onclick="openPostNewsSheet()">＋ 投稿</button>
            </div>
            <div class="card" style="margin-bottom: 0.8rem;">
                <button class="btn-primary" data-firebase-test-save style="margin-bottom: 0.3rem;">🧪 Firebase テスト保存</button>
                <div id="firebase-test-status" style="font-size: 0.75rem; color: var(--text-muted);">未実行</div>
            </div>
            <div class="card" id="home-news-preview"></div>
        </section>

        <!-- PAGE 2: STANDINGS -->
        <section id="page-standings" class="page">
            <div class="section-header">
                <div class="section-title">LEAGUE TABLE</div>
                <button class="line-share-btn" onclick="generateLineStandingsShareText()">
                    📲 順位表共有
                </button>
            </div>
            <div class="card" id="standings-card"></div>
        </section>

        <!-- PAGE 3: MATCHES -->
        <section id="page-matches" class="page">
            <div class="section-header">
                <div class="section-title">FIXTURES & RESULTS</div>
                <button class="line-share-btn" onclick="generateLineMatchweekShareText()">
                    📲 節結果共有
                </button>
            </div>
            <div class="filter-scroll" id="matches-filter-bar"></div>
            <div id="matches-list"></div>
        </section>

        <!-- PAGE 4: TEAMS -->
        <section id="page-teams" class="page">
            <div class="section-header">
                <div class="section-title">CLUBS</div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.6rem;" id="teams-grid"></div>
        </section>

        <!-- PAGE 5: NEWS -->
        <section id="page-news" class="page">
            <div class="section-header">
                <div class="section-title">NEWS</div>
                <button class="btn-secondary" onclick="openPostNewsSheet()">＋ 投稿</button>
            </div>
            <div class="card" id="full-news-list"></div>
        </section>

        <!-- PAGE 6: RULES -->
        <section id="page-rules" class="page">
            <div class="section-header">
                <div class="section-title">LEAGUE REGULATIONS</div>
            </div>
            <div id="rules-accordion-container"></div>
        </section>

    </main>

    <!-- ボトムナビゲーションバー -->
    <nav class="bottom-nav" id="bottom-nav-element">
        <div class="nav-item active" data-page="home" onclick="navigateTo('home', 'HOME', this)">
            <svg class="nav-svg-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>ホーム</span>
        </div>
        <div class="nav-item" data-page="standings" onclick="navigateTo('standings', '順位表', this)">
            <svg class="nav-svg-icon" viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0011 15.9V18H8v2h8v-2h-3v-2.1c1.73-.39 3.07-1.63 3.61-3.21C19.08 12.38 21 10.3 21 7.75V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
            <span>順位表</span>
        </div>
        <div class="nav-item" data-page="matches" onclick="navigateTo('matches', '日程・結果', this)">
            <svg class="nav-svg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8 0-.81.13-1.58.35-2.31l3.85 3.85v1.46c0 .55.45 1 1 1h2v2h.8c2.81 0 5.25-1.84 6.07-4.42 1.21 1.62 1.93 3.62 1.93 5.42 0 4.41-3.59 8-8 8z"/></svg>
            <span>日程</span>
        </div>
        <div class="nav-item" data-page="teams" onclick="navigateTo('teams', 'チーム', this)">
            <svg class="nav-svg-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8s0 .01 0 .01z"/></svg>
            <span>チーム</span>
        </div>
        <div class="nav-item" data-page="news" onclick="navigateTo('news', 'ニュース', this)">
            <svg class="nav-svg-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg>
            <span>ニュース</span>
        </div>
        <div class="nav-item" data-page="rules" onclick="navigateTo('rules', '規約', this)">
            <svg class="nav-svg-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <span>規約</span>
        </div>
    </nav>

    <!-- モーダルシート -->
    <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet(event)">
        <div class="sheet-content">
            <div class="sheet-bar"></div>
            <div id="sheet-body"></div>
        </div>
    </div>

    <!-- Main Logic Script -->
    <script>
        // ユーティリティ
        const badgeCache = new Map();
        function makeSvgBadge(text, c1, c2, shape = 'shield') {
            const key = `${text}_${c1}_${c2}_${shape}`;
            if (badgeCache.has(key)) return badgeCache.get(key);

            let svg = '';
            if (shape === 'shield') {
                svg = `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 100 100"><defs><linearGradient id="g_${text}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs><path d="M50,6 L86,22 L86,54 C86,74 50,94 50,94 C50,94 14,74 14,54 L14,22 Z" fill="url(#g_${text})" stroke="#ffffff" stroke-width="3"/><text x="50" y="58" font-family="sans-serif" font-size="26" font-weight="900" fill="#ffffff" text-anchor="middle">${text}</text></svg>`;
            } else {

            if (state.dbSaveFn) {
                state.dbSaveFn();
            }
        }

        loadPersistedState();
        loadStateFromUrl();

        function getTeamLogo(name) {
            const t = RAW_TEAMS.find(item => item.name === name);
            return t ? t.logo : makeSvgBadge('FNL', '#334155', '#0f172a', 'shield');
        }

        function calculateStandings() {
            if (!state.standingsDirty && state.cachedStandings) return state.cachedStandings;

            const standingsMap = {};
            RAW_TEAMS.forEach(t => {
                standingsMap[t.name] = { name: t.name, logo: t.logo, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0 };
            });

            state.schedule.forEach(m => {
                if (m.hs !== null && m.as !== null && !isNaN(m.hs) && !isNaN(m.as)) {
                    const hs = parseInt(m.hs, 10);
                    const as = parseInt(m.as, 10);
                    const home = standingsMap[m.h];
                    const away = standingsMap[m.a];
                    if (home && away) {
                        home.p += 1; away.p += 1; home.gf += hs; home.ga += as; away.gf += as; away.ga += hs;
                        if (hs > as) { home.w += 1; home.pts += 3; away.l += 1; }
                        else if (hs < as) { away.w += 1; away.pts += 3; home.l += 1; }
                        else { home.d += 1; home.pts += 1; away.d += 1; away.pts += 1; }
                        home.gd = home.gf - home.ga; away.gd = away.gf - away.ga;
                    }
                }
            });

            const list = Object.values(standingsMap);
            list.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
            list.forEach((t, i) => t.rank = i + 1);

            state.cachedStandings = list;
            state.standingsDirty = false;
            return list;
        }

    <!-- 完全同期用 Firebase クラウドスクリプト -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        try {
            const firebaseConfig = typeof window !== 'undefined' && window.FNL_FIREBASE_CONFIG
                ? window.FNL_FIREBASE_CONFIG
                : (typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                    apiKey: "dummy-key", authDomain: "fnl-league.firebaseapp.com", projectId: "fnl-league",
                    storageBucket: "fnl-league.appspot.com", messagingSenderId: "123456789", appId: "1:123456789:web:abcdef"
                });
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof window !== 'undefined' && window.FNL_FIREBASE_APP_ID
                ? window.FNL_FIREBASE_APP_ID
                : (typeof __app_id !== 'undefined' ? __app_id : 'fnl-season1');

            const setSyncStatus = (text, online = false) => {
                const dot = document.getElementById('sync-dot-indicator');
                const txt = document.getElementById('sync-text-status');
                if (dot) dot.classList.toggle('online', online);
                if (txt) txt.innerText = text;
            };

            setSyncStatus('Firebase 接続済み', true);

            window.__fnlFirebaseTestSave = async () => {
                const statusEl = document.getElementById('firebase-test-status');
                if (statusEl) statusEl.innerText = '保存中...';
                try {
                    const savePromise = addDoc(collection(db, 'teams'), {
                        teamName: 'FOOTBALL NINE LEAGUE テストチーム',
                        createdAt: new Date()
                    });
                    const timeoutPromise = new Promise((_, reject) => {
                        setTimeout(() => reject(new Error('Firebase save timed out')), 10000);
                    });
                    const docRef = await Promise.race([savePromise, timeoutPromise]);
                    if (statusEl) statusEl.innerText = `保存完了: ${docRef.id}`;
                    setSyncStatus('クラウド保存済み', true);
                    console.log('クラウド保存完了', docRef.id);
                } catch (e) {
                    if (statusEl) statusEl.innerText = '保存失敗';
                    setSyncStatus('接続エラー', false);
                    console.error('保存エラー', e);
                }
            };

            window.__fnlTriggerFirebaseTestSave = async function() {
                const statusEl = document.getElementById('firebase-test-status');
                if (statusEl) statusEl.innerText = '保存中...';
                console.log('Firebase test save clicked');
                window.__fnlSetTestStatus('保存中...', false);
                try {
                    await window.__fnlFirebaseTestSave();
                } catch (e) {
                    console.error('保存エラー', e);
                }
            };

            const syncDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'bundle', 'main_data');

            // クラウドへのデータ書き込み関数をグローバル連携
            state.dbSaveFn = async () => {
                const timestamp = state.lastSavedAt || new Date().toISOString();
                state.lastSavedAt = timestamp;
                saveStateToStorage();

                try {
                    if (!auth.currentUser) {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    }
                    await setDoc(syncDocRef, {
                        schedule: state.schedule,
                        news: state.news,
                        updatedAt: timestamp
                    }, { merge: true });
                    setSyncStatus('クラウド同期済み', true);
                } catch (e) {
                    console.warn('Cloud sync unavailable, keeping local data', e);
                    setSyncStatus('ローカル保存済み', true);
                }
            };

            const initCloud = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const dot = document.getElementById('sync-dot-indicator');
                    const txt = document.getElementById('sync-text-status');
                    if (dot) dot.classList.add('online');
                    if (txt) txt.innerText = 'クラウド同期中';
                } else {
                    setSyncStatus('ローカル保存済み', true);
                }

                onSnapshot(syncDocRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        const remoteUpdatedAt = data.updatedAt ? new Date(data.updatedAt).getTime() : 0;
                        const localUpdatedAt = state.lastSavedAt ? new Date(state.lastSavedAt).getTime() : 0;
                        const shouldApplyRemote = !state.lastSavedAt || remoteUpdatedAt >= localUpdatedAt;

                        if (data.schedule && shouldApplyRemote) state.schedule = data.schedule;
                        if (data.news && shouldApplyRemote) state.news = data.news;
                        if (data.updatedAt) state.lastSavedAt = data.updatedAt;
                        state.standingsDirty = true;
                        saveStateToStorage();
                        refreshAllViews();
                        renderNews();
                        setSyncStatus('クラウド同期済み', true);
                    } else {
                        saveStateToStorage();
                        setSyncStatus('ローカル保存済み', true);
                    }
                }, err => {
                    console.warn('Cloud listener unavailable, using local storage', err);
                    setSyncStatus('ローカル保存済み', true);
                });
            });

            initCloud();
        } catch (e) {
            console.log("Cloud sync running in passive mode");
        }
    </script>
</body>
</html>
